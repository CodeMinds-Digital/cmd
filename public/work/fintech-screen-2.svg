<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Typed CMS schema editor view">
  <defs>
    <linearGradient id="s2Glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.20"/>
      <stop offset="60%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1000" fill="#0a0a0c"/>
  <rect width="1600" height="1000" fill="url(#s2Glow)"/>

  <!-- Editor chrome -->
  <rect x="80" y="80" width="1440" height="840" rx="16" fill="#0e0e12" stroke="#22222a"/>

  <!-- Top bar -->
  <g transform="translate(80, 80)">
    <rect width="1440" height="48" fill="#101013"/>
    <line x1="0" y1="48" x2="1440" y2="48" stroke="#22222a"/>
    <circle cx="20" cy="24" r="5" fill="#67e8f9"/>
    <circle cx="40" cy="24" r="5" fill="#a5b4fc"/>
    <circle cx="60" cy="24" r="5" fill="#3a3a45"/>
    <text x="100" y="29" font-family="ui-monospace, monospace" font-size="13" fill="#cfcfd9">studio.codeminds.digital</text>
    <g font-family="Geist, system-ui, sans-serif" font-size="13" fill="#cfcfd9">
      <text x="700" y="29" text-anchor="middle">Pages · Posts · Authors · Settings</text>
    </g>
    <rect x="1340" y="14" width="80" height="20" rx="10" fill="#a5b4fc"/>
    <text x="1380" y="28" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" letter-spacing="2" fill="#0a0a0c">PUBLISH</text>
  </g>

  <!-- Left rail — schema tree -->
  <g transform="translate(80, 128)">
    <rect width="320" height="792" fill="#0a0a0c"/>
    <line x1="320" y1="0" x2="320" y2="792" stroke="#22222a"/>

    <text x="24" y="40" font-family="ui-monospace, monospace" font-size="11" letter-spacing="3" fill="#6b6c8a">SCHEMAS</text>

    <g font-family="Geist, system-ui, sans-serif" font-size="14" fill="#cfcfd9">
      <!-- Active item -->
      <rect x="12" y="60" width="296" height="36" rx="8" fill="#101013" stroke="#3a3a45"/>
      <circle cx="32" cy="78" r="3" fill="#67e8f9"/>
      <text x="48" y="83" fill="#f5f5f7">page · home</text>
      <text x="280" y="83" text-anchor="end" font-family="ui-monospace, monospace" font-size="10" fill="#67e8f9" letter-spacing="2">●</text>

      <text x="48" y="130">page · pricing</text>
      <text x="48" y="160">page · features</text>
      <text x="48" y="190">page · enterprise</text>
      <text x="48" y="230">post · case study</text>
      <text x="48" y="260">post · journal</text>
      <text x="48" y="300">block · hero</text>
      <text x="48" y="330">block · feature-grid</text>
      <text x="48" y="360">block · trust-bar</text>
      <text x="48" y="390">block · pull-quote</text>
      <text x="48" y="420">block · pricing-table</text>
      <text x="48" y="460">global · navigation</text>
      <text x="48" y="490">global · footer</text>
      <text x="48" y="520">global · seo-defaults</text>
    </g>
  </g>

  <!-- Right pane — schema editor -->
  <g transform="translate(400, 128)">
    <rect width="1120" height="792" fill="#0e0e12"/>

    <!-- Breadcrumb -->
    <g transform="translate(40, 36)" font-family="ui-monospace, monospace" font-size="12" letter-spacing="2" fill="#6b6c8a">
      <text>SCHEMAS / PAGE / HOME</text>
    </g>

    <!-- Title -->
    <g transform="translate(40, 80)" font-family="Geist, system-ui, sans-serif">
      <text font-size="32" font-weight="700" fill="#f5f5f7">page · home</text>
      <text y="36" font-size="14" fill="#cfcfd9" opacity="0.7">/  ·  Marketing landing — bound to the home route.</text>
    </g>

    <!-- Schema fields -->
    <g transform="translate(40, 200)" font-family="Geist, system-ui, sans-serif">
      <line x1="0" y1="0" x2="1040" y2="0" stroke="#22222a"/>
      <g transform="translate(0, 16)">
        <rect width="1040" height="60" fill="transparent"/>
        <text font-family="ui-monospace, monospace" font-size="12" letter-spacing="2" y="24" fill="#a5b4fc">title</text>
        <text font-family="ui-monospace, monospace" font-size="11" letter-spacing="2" y="42" fill="#6b6c8a">string · required · max 80</text>
        <rect x="280" y="6" width="700" height="48" rx="8" fill="#0a0a0c" stroke="#22222a"/>
        <text x="296" y="36" font-size="16" fill="#f5f5f7">Move money, in seconds.</text>
      </g>
      <line x1="0" y1="80" x2="1040" y2="80" stroke="#22222a"/>

      <g transform="translate(0, 96)">
        <text font-family="ui-monospace, monospace" font-size="12" letter-spacing="2" y="24" fill="#a5b4fc">subtitle</text>
        <text font-family="ui-monospace, monospace" font-size="11" letter-spacing="2" y="42" fill="#6b6c8a">string · max 160</text>
        <rect x="280" y="6" width="700" height="48" rx="8" fill="#0a0a0c" stroke="#22222a"/>
        <text x="296" y="36" font-size="14" fill="#cfcfd9">Open an account in 3 minutes. Move money in 3 seconds.</text>
      </g>
      <line x1="0" y1="160" x2="1040" y2="160" stroke="#22222a"/>

      <g transform="translate(0, 176)">
        <text font-family="ui-monospace, monospace" font-size="12" letter-spacing="2" y="24" fill="#a5b4fc">primaryCta</text>
        <text font-family="ui-monospace, monospace" font-size="11" letter-spacing="2" y="42" fill="#6b6c8a">reference · cta</text>
        <rect x="280" y="6" width="340" height="48" rx="8" fill="#0a0a0c" stroke="#22222a"/>
        <text x="296" y="36" font-size="14" fill="#f5f5f7">→ cta.open-account</text>
        <rect x="640" y="6" width="340" height="48" rx="8" fill="#0a0a0c" stroke="#22222a"/>
        <text x="656" y="36" font-size="14" fill="#cfcfd9">href: /signup</text>
      </g>
      <line x1="0" y1="240" x2="1040" y2="240" stroke="#22222a"/>

      <g transform="translate(0, 256)">
        <text font-family="ui-monospace, monospace" font-size="12" letter-spacing="2" y="24" fill="#a5b4fc">blocks</text>
        <text font-family="ui-monospace, monospace" font-size="11" letter-spacing="2" y="42" fill="#6b6c8a">array&lt;block&gt; · ordered · drag-drop</text>
        <g transform="translate(280, 0)">
          <rect width="700" height="48" rx="8" fill="#0a0a0c" stroke="#3a3a45"/>
          <circle cx="24" cy="24" r="4" fill="#67e8f9"/>
          <text x="44" y="29" font-family="Geist, system-ui, sans-serif" font-size="14" fill="#f5f5f7">01 · trust-bar</text>
          <text x="660" y="29" text-anchor="end" font-family="ui-monospace, monospace" font-size="10" letter-spacing="2" fill="#67e8f9">PUBLISHED</text>
        </g>
        <g transform="translate(280, 60)">
          <rect width="700" height="48" rx="8" fill="#0a0a0c" stroke="#22222a"/>
          <circle cx="24" cy="24" r="4" fill="#a5b4fc"/>
          <text x="44" y="29" font-family="Geist, system-ui, sans-serif" font-size="14" fill="#f5f5f7">02 · feature-grid</text>
          <text x="660" y="29" text-anchor="end" font-family="ui-monospace, monospace" font-size="10" letter-spacing="2" fill="#a5b4fc">DRAFT</text>
        </g>
        <g transform="translate(280, 120)">
          <rect width="700" height="48" rx="8" fill="#0a0a0c" stroke="#22222a"/>
          <circle cx="24" cy="24" r="4" fill="#67e8f9"/>
          <text x="44" y="29" font-family="Geist, system-ui, sans-serif" font-size="14" fill="#f5f5f7">03 · pull-quote</text>
          <text x="660" y="29" text-anchor="end" font-family="ui-monospace, monospace" font-size="10" letter-spacing="2" fill="#67e8f9">PUBLISHED</text>
        </g>
        <g transform="translate(280, 180)">
          <rect width="700" height="48" rx="8" fill="#0a0a0c" stroke="#22222a" stroke-dasharray="4 6"/>
          <text x="44" y="29" font-family="Geist, system-ui, sans-serif" font-size="14" fill="#6b6c8a">+ Add block</text>
        </g>
      </g>
    </g>

    <!-- Footer save bar -->
    <g transform="translate(40, 720)">
      <rect width="1040" height="48" rx="8" fill="#101013" stroke="#22222a"/>
      <circle cx="24" cy="24" r="4" fill="#67e8f9"/>
      <text x="44" y="29" font-family="ui-monospace, monospace" font-size="12" letter-spacing="2" fill="#cfcfd9">CHANGES PENDING · TYPE-CHECK PASSED · 0 ERRORS</text>
      <rect x="900" y="8" width="120" height="32" rx="16" fill="#a5b4fc"/>
      <text x="960" y="29" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" letter-spacing="2" fill="#0a0a0c">PUBLISH</text>
    </g>
  </g>

  <!-- Caption strip -->
  <g font-family="ui-monospace, monospace" font-size="14" letter-spacing="3" fill="#6b6c8a">
    <text x="80" y="60">FIG.02 — TYPED SCHEMA · MARKETING SHIPS WITHOUT ENGINEERING</text>
  </g>
</svg>
