<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Fintech home — before vs after layout comparison">
  <defs>
    <linearGradient id="s1Glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.30"/>
      <stop offset="55%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1000" fill="#0a0a0c"/>

  <!-- Split divider -->
  <line x1="800" y1="60" x2="800" y2="940" stroke="#22222a" stroke-width="1" stroke-dasharray="3 6"/>

  <!-- Header strip -->
  <g font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" letter-spacing="3" fill="#6b6c8a">
    <text x="80" y="80">FIG.01 — HOME ROUTE</text>
    <text x="80" y="110" fill="#3a3a45">BEFORE</text>
    <text x="880" y="110" fill="#67e8f9">AFTER</text>
  </g>

  <!-- ── BEFORE side (dimmed, slow) ───────────────────────────────────── -->
  <g opacity="0.55">
    <!-- Browser chrome -->
    <rect x="80" y="160" width="640" height="700" rx="16" fill="#0e0e12" stroke="#22222a"/>
    <g transform="translate(80, 160)">
      <rect width="640" height="40" fill="#101013"/>
      <circle cx="20" cy="20" r="5" fill="#3a3a45"/>
      <circle cx="40" cy="20" r="5" fill="#3a3a45"/>
      <circle cx="60" cy="20" r="5" fill="#3a3a45"/>
      <rect x="100" y="10" width="400" height="20" rx="10" fill="#0a0a0c"/>
    </g>

    <!-- Page content (chunky, slow-loading vibe) -->
    <g transform="translate(80, 220)">
      <!-- Hero (uncropped image suggesting CLS) -->
      <rect x="0" y="0" width="640" height="200" fill="#1a1a22"/>
      <rect x="20" y="20" width="200" height="14" rx="3" fill="#3a3a45"/>
      <rect x="20" y="44" width="120" height="10" rx="3" fill="#3a3a45"/>
      <!-- Diagonal "loading" pattern -->
      <line x1="0" y1="100" x2="640" y2="100" stroke="#22222a" stroke-width="1"/>
      <text x="320" y="115" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#3a3a45" letter-spacing="3">LCP · 4.1s · CLS 0.18</text>

      <rect x="0" y="220" width="640" height="80" fill="#11111a"/>
      <rect x="0" y="320" width="640" height="80" fill="#0e0e16"/>
      <rect x="0" y="420" width="640" height="80" fill="#11111a"/>
      <rect x="0" y="520" width="640" height="80" fill="#0e0e16"/>
    </g>

    <!-- Vitals badges -->
    <g transform="translate(80, 880)" font-family="ui-monospace, monospace" font-size="14" fill="#ef4444">
      <text x="0" y="0">LCP 4.1s</text>
      <text x="120" y="0">CLS 0.18</text>
      <text x="240" y="0">INP 320ms</text>
      <text x="380" y="0" fill="#3a3a45">PERF · 41 / 100</text>
    </g>
  </g>

  <!-- ── AFTER side (bright, sharp) ───────────────────────────────────── -->
  <g>
    <!-- Background glow -->
    <rect x="880" y="160" width="640" height="700" rx="16" fill="url(#s1Glow)"/>
    <!-- Browser chrome -->
    <rect x="880" y="160" width="640" height="700" rx="16" fill="#101013" stroke="#3a3a45"/>
    <g transform="translate(880, 160)">
      <rect width="640" height="40" fill="#17171b"/>
      <circle cx="20" cy="20" r="5" fill="#67e8f9"/>
      <circle cx="40" cy="20" r="5" fill="#a5b4fc"/>
      <circle cx="60" cy="20" r="5" fill="#3a3a45"/>
      <rect x="100" y="10" width="400" height="20" rx="10" fill="#0a0a0c"/>
      <text x="120" y="25" font-family="ui-monospace, monospace" font-size="11" fill="#a5b4fc">codeminds.digital</text>
    </g>

    <g transform="translate(880, 220)">
      <!-- Hero -->
      <rect x="0" y="0" width="640" height="220" rx="14" fill="#0e0e12" stroke="#22222a"/>
      <text x="20" y="60" font-family="Geist, system-ui, sans-serif" font-size="34" font-weight="700" fill="#f5f5f7">Move money,</text>
      <text x="20" y="98" font-family="'Instrument Serif', Georgia, serif" font-size="32" font-style="italic" fill="#a5b4fc">in seconds.</text>
      <rect x="20" y="130" width="220" height="36" rx="18" fill="#f5f5f7"/>
      <text x="130" y="153" text-anchor="middle" font-family="Geist, system-ui, sans-serif" font-size="13" font-weight="500" fill="#0a0a0c">Open an account →</text>
      <rect x="260" y="130" width="180" height="36" rx="18" fill="none" stroke="#3a3a45"/>
      <text x="350" y="153" text-anchor="middle" font-family="Geist, system-ui, sans-serif" font-size="13" fill="#cfcfd9">See pricing</text>

      <!-- Trust strip -->
      <g transform="translate(0, 240)" font-family="ui-monospace, monospace" font-size="11" letter-spacing="3" fill="#6b6c8a">
        <text x="20" y="14">TRUSTED BY</text>
        <g fill="#a5a5b4">
          <text x="120" y="14">LATTICE</text>
          <text x="220" y="14">VERCEL</text>
          <text x="310" y="14">LINEAR</text>
          <text x="400" y="14">NOTION</text>
          <text x="500" y="14">STRIPE</text>
        </g>
      </g>

      <!-- Feature cards -->
      <g transform="translate(0, 290)">
        <rect x="0" y="0" width="200" height="160" rx="14" fill="#0e0e12" stroke="#22222a"/>
        <rect x="14" y="14" width="32" height="32" rx="8" fill="#a5b4fc" opacity="0.2"/>
        <rect x="14" y="60" width="120" height="10" rx="3" fill="#f5f5f7"/>
        <rect x="14" y="80" width="160" height="8" rx="3" fill="#cfcfd9" opacity="0.5"/>
        <rect x="14" y="96" width="140" height="8" rx="3" fill="#cfcfd9" opacity="0.5"/>

        <rect x="220" y="0" width="200" height="160" rx="14" fill="#0e0e12" stroke="#22222a"/>
        <rect x="234" y="14" width="32" height="32" rx="8" fill="#67e8f9" opacity="0.2"/>
        <rect x="234" y="60" width="120" height="10" rx="3" fill="#f5f5f7"/>
        <rect x="234" y="80" width="160" height="8" rx="3" fill="#cfcfd9" opacity="0.5"/>
        <rect x="234" y="96" width="140" height="8" rx="3" fill="#cfcfd9" opacity="0.5"/>

        <rect x="440" y="0" width="200" height="160" rx="14" fill="#0e0e12" stroke="#22222a"/>
        <rect x="454" y="14" width="32" height="32" rx="8" fill="#a5b4fc" opacity="0.2"/>
        <rect x="454" y="60" width="120" height="10" rx="3" fill="#f5f5f7"/>
        <rect x="454" y="80" width="160" height="8" rx="3" fill="#cfcfd9" opacity="0.5"/>
        <rect x="454" y="96" width="140" height="8" rx="3" fill="#cfcfd9" opacity="0.5"/>
      </g>

      <!-- Big number callout -->
      <g transform="translate(0, 480)">
        <text x="20" y="20" font-family="ui-monospace, monospace" font-size="11" letter-spacing="3" fill="#6b6c8a">RESULT</text>
        <text x="20" y="92" font-family="Geist, system-ui, sans-serif" font-size="64" font-weight="700" fill="#f5f5f7">+47%</text>
        <text x="160" y="92" font-family="'Instrument Serif', Georgia, serif" font-size="32" font-style="italic" fill="#a5b4fc">conversion lift</text>
      </g>
    </g>

    <g transform="translate(880, 880)" font-family="ui-monospace, monospace" font-size="14" fill="#67e8f9">
      <text x="0" y="0">LCP 1.6s</text>
      <text x="120" y="0">CLS 0.02</text>
      <text x="240" y="0">INP 88ms</text>
      <text x="380" y="0" fill="#a5b4fc">PERF · 98 / 100</text>
    </g>
  </g>
</svg>
