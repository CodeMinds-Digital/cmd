<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Lighthouse CI gate failing a regression PR">
  <defs>
    <linearGradient id="s3Glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1000" fill="#0a0a0c"/>
  <rect width="1600" height="1000" fill="url(#s3Glow)"/>

  <!-- App chrome -->
  <rect x="80" y="80" width="1440" height="840" rx="16" fill="#0e0e12" stroke="#22222a"/>

  <!-- Top bar -->
  <g transform="translate(80, 80)">
    <rect width="1440" height="48" fill="#101013"/>
    <line x1="0" y1="48" x2="1440" y2="48" stroke="#22222a"/>
    <circle cx="20" cy="24" r="5" fill="#67e8f9"/>
    <circle cx="40" cy="24" r="5" fill="#a5b4fc"/>
    <circle cx="60" cy="24" r="5" fill="#3a3a45"/>
    <text x="100" y="29" font-family="ui-monospace, monospace" font-size="13" fill="#cfcfd9">github.com / fintech / web · pull/482</text>
  </g>

  <!-- PR header -->
  <g transform="translate(120, 168)">
    <text font-family="ui-monospace, monospace" font-size="13" letter-spacing="3" fill="#6b6c8a">#482</text>
    <text x="60" font-family="Geist, system-ui, sans-serif" font-size="22" font-weight="600" fill="#f5f5f7">feat: hero video on home + new feature carousel</text>
    <text y="32" x="60" font-family="ui-monospace, monospace" font-size="12" letter-spacing="2" fill="#6b6c8a">opened 4h ago · 12 files changed · +482 / −38</text>

    <!-- Status pill -->
    <rect x="1180" y="-8" width="200" height="48" rx="24" fill="#1a0e10" stroke="#ef4444"/>
    <circle cx="1206" cy="16" r="6" fill="#ef4444"/>
    <text x="1224" y="22" font-family="ui-monospace, monospace" font-size="13" letter-spacing="2" fill="#ef4444">CHECKS FAILED</text>
  </g>

  <!-- Checks panel -->
  <g transform="translate(120, 260)">
    <rect width="1360" height="180" rx="14" fill="#101013" stroke="#22222a"/>
    <text x="24" y="32" font-family="ui-monospace, monospace" font-size="12" letter-spacing="3" fill="#6b6c8a">CHECKS · 4 OF 5 PASSED</text>

    <g font-family="Geist, system-ui, sans-serif" font-size="14" fill="#cfcfd9">
      <!-- pass row -->
      <g transform="translate(24, 60)">
        <circle cx="10" cy="10" r="8" fill="#67e8f9"/>
        <text x="34" y="15" font-weight="600" fill="#f5f5f7">build</text>
        <text x="200" y="15" fill="#cfcfd9" opacity="0.7">turbopack · 2.4s</text>
        <text x="1300" y="15" text-anchor="end" font-family="ui-monospace, monospace" font-size="12" fill="#67e8f9" letter-spacing="2">PASS</text>
      </g>
      <g transform="translate(24, 86)">
        <circle cx="10" cy="10" r="8" fill="#67e8f9"/>
        <text x="34" y="15" font-weight="600" fill="#f5f5f7">type-check</text>
        <text x="200" y="15" fill="#cfcfd9" opacity="0.7">tsc --noEmit · 2.1s</text>
        <text x="1300" y="15" text-anchor="end" font-family="ui-monospace, monospace" font-size="12" fill="#67e8f9" letter-spacing="2">PASS</text>
      </g>
      <g transform="translate(24, 112)">
        <circle cx="10" cy="10" r="8" fill="#67e8f9"/>
        <text x="34" y="15" font-weight="600" fill="#f5f5f7">unit tests</text>
        <text x="200" y="15" fill="#cfcfd9" opacity="0.7">142 passed · 0 failed</text>
        <text x="1300" y="15" text-anchor="end" font-family="ui-monospace, monospace" font-size="12" fill="#67e8f9" letter-spacing="2">PASS</text>
      </g>
      <g transform="translate(24, 138)">
        <circle cx="10" cy="10" r="8" fill="#ef4444"/>
        <text x="34" y="15" font-weight="600" fill="#f5f5f7">lighthouse-ci · home</text>
        <text x="280" y="15" fill="#cfcfd9" opacity="0.7">perf 87 below threshold (95)</text>
        <text x="1300" y="15" text-anchor="end" font-family="ui-monospace, monospace" font-size="12" fill="#ef4444" letter-spacing="2">FAIL</text>
      </g>
    </g>
  </g>

  <!-- Lighthouse score panels -->
  <g transform="translate(120, 480)">
    <text font-family="ui-monospace, monospace" font-size="12" letter-spacing="3" fill="#6b6c8a">LIGHTHOUSE · home route · CI run #4221</text>

    <!-- Performance dial -->
    <g transform="translate(0, 40)">
      <rect width="320" height="200" rx="14" fill="#101013" stroke="#3a0a0a"/>
      <text x="20" y="32" font-family="ui-monospace, monospace" font-size="11" letter-spacing="3" fill="#ef4444">PERFORMANCE · FAIL</text>
      <text x="20" y="120" font-family="Geist, system-ui, sans-serif" font-size="80" font-weight="700" fill="#ef4444">87</text>
      <text x="160" y="120" font-family="Geist, system-ui, sans-serif" font-size="32" fill="#cfcfd9" opacity="0.6">/100</text>
      <text x="20" y="170" font-family="ui-monospace, monospace" font-size="12" fill="#6b6c8a">target ≥ 95 · gap −8</text>
    </g>

    <!-- Other categories pass -->
    <g transform="translate(340, 40)">
      <rect width="320" height="200" rx="14" fill="#101013" stroke="#22222a"/>
      <text x="20" y="32" font-family="ui-monospace, monospace" font-size="11" letter-spacing="3" fill="#67e8f9">ACCESSIBILITY</text>
      <text x="20" y="120" font-family="Geist, system-ui, sans-serif" font-size="80" font-weight="700" fill="#67e8f9">100</text>
      <text x="20" y="170" font-family="ui-monospace, monospace" font-size="12" fill="#6b6c8a">target = 100 · pass</text>
    </g>
    <g transform="translate(680, 40)">
      <rect width="320" height="200" rx="14" fill="#101013" stroke="#22222a"/>
      <text x="20" y="32" font-family="ui-monospace, monospace" font-size="11" letter-spacing="3" fill="#a5b4fc">BEST PRACTICES</text>
      <text x="20" y="120" font-family="Geist, system-ui, sans-serif" font-size="80" font-weight="700" fill="#a5b4fc">96</text>
      <text x="20" y="170" font-family="ui-monospace, monospace" font-size="12" fill="#6b6c8a">target ≥ 90 · pass</text>
    </g>
    <g transform="translate(1020, 40)">
      <rect width="320" height="200" rx="14" fill="#101013" stroke="#22222a"/>
      <text x="20" y="32" font-family="ui-monospace, monospace" font-size="11" letter-spacing="3" fill="#a5b4fc">SEO</text>
      <text x="20" y="120" font-family="Geist, system-ui, sans-serif" font-size="80" font-weight="700" fill="#a5b4fc">100</text>
      <text x="20" y="170" font-family="ui-monospace, monospace" font-size="12" fill="#6b6c8a">target ≥ 95 · pass</text>
    </g>
  </g>

  <!-- Vitals delta strip -->
  <g transform="translate(120, 740)">
    <rect width="1360" height="140" rx="14" fill="#101013" stroke="#22222a"/>
    <text x="24" y="36" font-family="ui-monospace, monospace" font-size="12" letter-spacing="3" fill="#6b6c8a">REGRESSION DETAIL · vs main</text>

    <g transform="translate(24, 64)" font-family="ui-monospace, monospace" font-size="14">
      <g>
        <text fill="#cfcfd9">LCP</text>
        <text x="80" fill="#67e8f9">1.6s</text>
        <text x="180" fill="#6b6c8a">→</text>
        <text x="220" fill="#ef4444">2.8s</text>
        <text x="320" fill="#ef4444" letter-spacing="2">+1.2s</text>
      </g>
      <g transform="translate(440, 0)">
        <text fill="#cfcfd9">INP</text>
        <text x="80" fill="#67e8f9">88ms</text>
        <text x="180" fill="#6b6c8a">→</text>
        <text x="220" fill="#a5b4fc">112ms</text>
        <text x="340" fill="#a5b4fc" letter-spacing="2">+24ms</text>
      </g>
      <g transform="translate(900, 0)">
        <text fill="#cfcfd9">CLS</text>
        <text x="80" fill="#67e8f9">0.02</text>
        <text x="180" fill="#6b6c8a">→</text>
        <text x="220" fill="#ef4444">0.14</text>
        <text x="340" fill="#ef4444" letter-spacing="2">+0.12</text>
      </g>
    </g>

    <text x="24" y="120" font-family="ui-monospace, monospace" font-size="12" fill="#cfcfd9">→ block hero video lazy-load · revisit asset weight</text>
  </g>

  <!-- Caption -->
  <g font-family="ui-monospace, monospace" font-size="14" letter-spacing="3" fill="#6b6c8a">
    <text x="80" y="60">FIG.03 — CI HARD-GATE BLOCKS REGRESSION BEFORE MERGE</text>
  </g>
</svg>
