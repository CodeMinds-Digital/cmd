<svg width="120" height="40" viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Modern geometric logo -->
  <rect x="0" y="8" width="24" height="24" rx="6" fill="url(#logoGradient)"/>
  <rect x="6" y="14" width="12" height="12" rx="3" fill="white" opacity="0.9"/>
  <circle cx="12" cy="20" r="3" fill="url(#logoGradient)"/>
  
  <!-- Company name -->
  <text x="32" y="16" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="currentColor">
    CodeMinds
  </text>
  <text x="32" y="28" font-family="Inter, sans-serif" font-size="10" font-weight="400" fill="currentColor" opacity="0.7">
    DIGITAL
  </text>
</svg>
