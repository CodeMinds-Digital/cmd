<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Fintech rebuild — performance chart cover">
  <defs>
    <linearGradient id="ftGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ftGlow2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.32"/>
      <stop offset="55%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ftLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0"/>
      <stop offset="20%" stop-color="#a5b4fc" stop-opacity="1"/>
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="1"/>
    </linearGradient>
    <pattern id="ftGrid" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#22222a" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="1000" fill="#0a0a0c"/>
  <rect width="1600" height="1000" fill="url(#ftGlow)"/>
  <rect width="1600" height="1000" fill="url(#ftGlow2)"/>
  <rect width="1600" height="1000" fill="url(#ftGrid)" opacity="0.6"/>

  <!-- Editorial monospace meta strip -->
  <g font-family="ui-monospace, SFMono-Regular, monospace" font-size="20" letter-spacing="3" fill="#6b6c8a">
    <text x="80" y="100">CASE 01 / FINTECH</text>
    <text x="1520" y="100" text-anchor="end">2026 · Q1</text>
  </g>

  <!-- Title block -->
  <g font-family="Geist, system-ui, sans-serif">
    <text x="80" y="220" font-size="56" font-weight="600" fill="#f5f5f7">Marketing rebuild</text>
    <text x="80" y="280" font-size="42" font-weight="400" fill="#a5b4fc" font-style="italic" font-family="'Instrument Serif', Georgia, serif">for a fintech</text>
  </g>

  <!-- Performance arc — falls then rises -->
  <g transform="translate(80, 540)">
    <!-- Axis tick marks -->
    <g font-family="ui-monospace, monospace" font-size="14" fill="#6b6c8a">
      <text x="0" y="280">0s</text>
      <text x="0" y="180">2s</text>
      <text x="0" y="80">4s</text>
    </g>
    <!-- Baseline -->
    <line x1="40" y1="280" x2="1440" y2="280" stroke="#22222a" stroke-width="1"/>
    <line x1="40" y1="180" x2="1440" y2="180" stroke="#22222a" stroke-width="1" stroke-dasharray="4 6"/>

    <!-- Old, dimmed performance -->
    <path d="M 40 80 Q 200 60 360 90 T 720 100 T 1080 70 T 1440 95"
          fill="none" stroke="#3a3a45" stroke-width="2"/>
    <text x="80" y="60" font-family="ui-monospace, monospace" font-size="14" fill="#3a3a45" letter-spacing="2">BEFORE · 4.1s LCP</text>

    <!-- New, bright performance -->
    <path d="M 40 80 L 360 80 L 540 230 L 720 240 L 900 245 L 1080 248 L 1260 250 L 1440 252"
          fill="none" stroke="url(#ftLine)" stroke-width="3" stroke-linecap="round"/>

    <!-- End point glow -->
    <circle cx="1440" cy="252" r="6" fill="#67e8f9"/>
    <circle cx="1440" cy="252" r="14" fill="#67e8f9" opacity="0.25"/>

    <!-- Result label -->
    <g transform="translate(1340, 200)">
      <text font-family="ui-monospace, monospace" font-size="14" fill="#a5b4fc" letter-spacing="2">AFTER</text>
      <text y="32" font-family="Geist, system-ui, sans-serif" font-size="44" font-weight="700" fill="#f5f5f7">1.6s</text>
    </g>
  </g>

  <!-- Bottom anchor strip -->
  <g font-family="ui-monospace, monospace" font-size="16" letter-spacing="3" fill="#6b6c8a">
    <text x="80" y="950">CODEMINDS · FIG.01</text>
    <text x="800" y="950" text-anchor="middle">CONVERSION +47% · ASSET WEIGHT −68%</text>
    <text x="1520" y="950" text-anchor="end">SCROLL ↓</text>
  </g>
</svg>
