<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="AI search — embeddings and result stream cover">
  <defs>
    <linearGradient id="aiGlow1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aiGlow2" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.4"/>
      <stop offset="55%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="dotField" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a5b4fc" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="1000" fill="#0a0a0c"/>
  <rect width="1600" height="1000" fill="url(#aiGlow1)"/>
  <rect width="1600" height="1000" fill="url(#aiGlow2)"/>

  <!-- Editorial meta strip -->
  <g font-family="ui-monospace, SFMono-Regular, monospace" font-size="20" letter-spacing="3" fill="#6b6c8a">
    <text x="80" y="100">CASE 03 / AI SEARCH</text>
    <text x="1520" y="100" text-anchor="end">SHIPPING · MAY 2026</text>
  </g>

  <!-- Title -->
  <g font-family="Geist, system-ui, sans-serif">
    <text x="80" y="220" font-size="56" font-weight="600" fill="#f5f5f7">Practical RAG</text>
    <text x="80" y="280" font-size="42" font-weight="400" fill="#a5b4fc" font-style="italic" font-family="'Instrument Serif', Georgia, serif">over 1.2M documents.</text>
  </g>

  <!-- Embedding dot field (left half) -->
  <g transform="translate(140, 480)" opacity="0.95">
    <circle cx="320" cy="120" r="240" fill="url(#dotField)"/>
    <!-- Scattered points — geometric, deterministic -->
    <g fill="#a5b4fc">
      <circle cx="80" cy="60" r="3"/>
      <circle cx="140" cy="40" r="2"/>
      <circle cx="200" cy="100" r="4"/>
      <circle cx="260" cy="60" r="3"/>
      <circle cx="320" cy="120" r="6"/>
      <circle cx="380" cy="80" r="3"/>
      <circle cx="440" cy="140" r="2"/>
      <circle cx="500" cy="100" r="4"/>
      <circle cx="100" cy="180" r="2"/>
      <circle cx="180" cy="200" r="3"/>
      <circle cx="240" cy="220" r="4"/>
      <circle cx="300" cy="240" r="3"/>
      <circle cx="360" cy="200" r="5"/>
      <circle cx="420" cy="220" r="2"/>
      <circle cx="480" cy="180" r="3"/>
      <circle cx="540" cy="220" r="4"/>
    </g>
    <g fill="#67e8f9">
      <circle cx="120" cy="120" r="3"/>
      <circle cx="220" cy="160" r="2"/>
      <circle cx="380" cy="40" r="3"/>
      <circle cx="460" cy="80" r="2"/>
      <circle cx="160" cy="260" r="3"/>
      <circle cx="280" cy="180" r="3"/>
      <circle cx="400" cy="260" r="2"/>
      <circle cx="540" cy="60" r="3"/>
    </g>
    <!-- Highlighted query node -->
    <circle cx="320" cy="120" r="14" fill="none" stroke="#67e8f9" stroke-width="2"/>
    <circle cx="320" cy="120" r="22" fill="none" stroke="#67e8f9" stroke-width="1" opacity="0.4"/>
    <!-- Connecting lines to nearest neighbours -->
    <g stroke="#67e8f9" stroke-width="1" opacity="0.5">
      <line x1="320" y1="120" x2="260" y2="60"/>
      <line x1="320" y1="120" x2="380" y2="80"/>
      <line x1="320" y1="120" x2="300" y2="240"/>
    </g>
    <text x="0" y="-20" font-family="ui-monospace, monospace" font-size="14" fill="#67e8f9" letter-spacing="2">EMBEDDING SPACE · pgvector</text>
  </g>

  <!-- Result stream (right half) -->
  <g transform="translate(880, 380)">
    <!-- Search input -->
    <rect x="0" y="0" width="600" height="64" rx="32" fill="#101013" stroke="#22222a"/>
    <circle cx="40" cy="32" r="8" fill="none" stroke="#a5b4fc" stroke-width="2"/>
    <line x1="46" y1="38" x2="56" y2="48" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round"/>
    <text x="80" y="38" font-family="Geist, system-ui, sans-serif" font-size="18" fill="#cfcfd9">how does revenue recognition work…</text>
    <rect x="500" y="20" width="80" height="24" rx="12" fill="#a5b4fc"/>
    <text x="540" y="36" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#0a0a0c" letter-spacing="2">⌘K</text>

    <!-- Result rows -->
    <g transform="translate(0, 100)" font-family="Geist, system-ui, sans-serif">
      <g>
        <rect x="0" y="0" width="600" height="84" rx="14" fill="#101013" stroke="#22222a"/>
        <text x="20" y="32" font-size="18" font-weight="600" fill="#f5f5f7">ASC 606 in product accounting</text>
        <text x="20" y="58" font-size="14" fill="#cfcfd9" opacity="0.8">A practical guide to recognising revenue when…</text>
        <g font-family="ui-monospace, monospace" font-size="11" letter-spacing="2" fill="#67e8f9">
          <text x="20" y="76">handbook.md · §3</text>
        </g>
        <text x="580" y="32" text-anchor="end" font-family="ui-monospace, monospace" font-size="14" fill="#a5b4fc">0.89</text>
      </g>
      <g transform="translate(0, 100)">
        <rect x="0" y="0" width="600" height="84" rx="14" fill="#101013" stroke="#22222a"/>
        <text x="20" y="32" font-size="18" font-weight="600" fill="#f5f5f7">Subscriptions vs term-based contracts</text>
        <text x="20" y="58" font-size="14" fill="#cfcfd9" opacity="0.8">Difference in deferred revenue treatment when…</text>
        <g font-family="ui-monospace, monospace" font-size="11" letter-spacing="2" fill="#67e8f9">
          <text x="20" y="76">policy.md · §2.4</text>
        </g>
        <text x="580" y="32" text-anchor="end" font-family="ui-monospace, monospace" font-size="14" fill="#a5b4fc">0.82</text>
      </g>
      <g transform="translate(0, 200)">
        <rect x="0" y="0" width="600" height="84" rx="14" fill="#101013" stroke="#22222a"/>
        <text x="20" y="32" font-size="18" font-weight="600" fill="#f5f5f7">Edge cases — usage-based pricing</text>
        <text x="20" y="58" font-size="14" fill="#cfcfd9" opacity="0.8">Variable consideration and how we estimate…</text>
        <g font-family="ui-monospace, monospace" font-size="11" letter-spacing="2" fill="#67e8f9">
          <text x="20" y="76">cookbook.md · §6</text>
        </g>
        <text x="580" y="32" text-anchor="end" font-family="ui-monospace, monospace" font-size="14" fill="#a5b4fc">0.78</text>
      </g>
    </g>

    <text x="0" y="-20" font-family="ui-monospace, monospace" font-size="14" fill="#a5b4fc" letter-spacing="2">RESULTS · 1.2M DOCS · 187ms</text>
  </g>

  <!-- Bottom anchor strip -->
  <g font-family="ui-monospace, monospace" font-size="16" letter-spacing="3" fill="#6b6c8a">
    <text x="80" y="950">CODEMINDS · FIG.03</text>
    <text x="800" y="950" text-anchor="middle">OPENAI · pgvector · EMBEDDINGS · CITATIONS</text>
    <text x="1520" y="950" text-anchor="end">IN PROGRESS ●</text>
  </g>
</svg>
